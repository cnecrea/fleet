name: Raportare problemă
description: Raportați o problemă legată de integrarea Fleet (Manager de flotă).
title: "[BUG] Descriere scurtă a problemei"
labels: bug
body:
  - type: markdown
    attributes:
      value: >
        ⚠️ **ATENȚIE:** ⚠️

        Înainte de a raporta o problemă, te rog să verifici:

        1. [**README.md**](https://github.com/cnecrea/fleet/blob/main/README.md) — documentație și configurare

        2. [**Issues existente**](https://github.com/cnecrea/fleet/issues) — poate problema a fost deja raportată

        Dacă problema persistă după ce ai consultat documentația, completează informațiile de mai jos.

  - type: dropdown
    id: citit_documentatie
    attributes:
      label: Ați citit documentația (README.md)?
      description: Te rog să confirmi că ai citit documentația înainte de a raporta problema.
      options:
        - "Selectează o opțiune…"
        - "Nu, nu am citit documentația."
        - "Da, am citit README.md și nu am găsit răspunsul la problema mea."
    validations:
      required: true

  - type: textarea
    id: descriere
    attributes:
      label: Descrieți problema
      description: |
        Explicați clar:
        - Ce ai așteptat să se întâmple
        - Ce s-a întâmplat de fapt
        - Pașii pentru a reproduce problema

        **Nu introduceți logurile aici.** Logurile trebuie raportate în secțiunea dedicată de mai jos.
      placeholder: |
        Exemplu:
        - Am configurat vehiculul B123ABC și am completat datele RCA.
        - Mă așteptam ca senzorul RCA să arate data de expirare, dar afișează „Necunoscut".
        - Problema apare constant, nu doar după restart.
    validations:
      required: true

  - type: dropdown
    id: categorie
    attributes:
      label: Categoria problemei
      description: Selectați zona afectată.
      options:
        - "Selectează o opțiune…"
        - "Configurare vehicul (config flow / opțiuni)"
        - "Senzori (valori incorecte, lipsă, necunoscut)"
        - "Licențiere (activare, trial, expirare)"
        - "Backup / Restore (export, import, ZIP)"
        - "Performanță (lentoare, memorie, erori)"
        - "Altceva"
    validations:
      required: true

  - type: input
    id: versiune_integrare
    attributes:
      label: Versiunea integrării Fleet
      description: O găsești în **Settings** → **Devices & Services** → Fleet, sau în `custom_components/fleet/manifest.json` (câmpul `version`).
      placeholder: "Exemplu: 1.0.0"
    validations:
      required: true

  - type: input
    id: versiune_ha
    attributes:
      label: Versiunea Home Assistant
      description: O găsești în **Settings** → **About**.
      placeholder: "Exemplu: 2026.3.0"
    validations:
      required: true

  - type: input
    id: sistem_operare
    attributes:
      label: Metoda de instalare HA
      description: Cum ai instalat Home Assistant (HAOS, Docker, Core, Supervised)?
      placeholder: "Exemplu: Home Assistant OS pe Raspberry Pi 4"
    validations:
      required: true

  - type: input
    id: nr_vehicule
    attributes:
      label: Număr de vehicule configurate
      description: Câte vehicule ai adăugate în integrare?
      placeholder: "Exemplu: 15"
    validations:
      required: false

  - type: markdown
    attributes:
      value: >
        ---

        ### Loguri și diagnostics

  - type: textarea
    id: loguri
    attributes:
      label: Loguri relevante
      description: |
        Activează debug logging adăugând în `configuration.yaml`:
        ```yaml
        logger:
          default: warning
          logs:
            custom_components.fleet: debug
        ```
        Reproduce problema, apoi copiază logurile filtrate după `fleet`.
      placeholder: |
        2026-03-18 10:30:00 DEBUG custom_components.fleet ...
        2026-03-18 10:30:01 ERROR custom_components.fleet ...
      render: yaml
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics (opțional, dar foarte util)
      description: |
        Exportă diagnostics-ul: **Settings** → **Devices & Services** → Fleet → ⋮ → **Download diagnostics**.
        Lipește conținutul JSON aici sau atașează fișierul la issue.

        Diagnostics-ul NU conține date personale — e safe de postat public.
      placeholder: "Lipește conținutul JSON al fișierului diagnostics aici, sau atașează-l ca fișier."
      render: json
    validations:
      required: false

  - type: dropdown
    id: restart
    attributes:
      label: Ați încercat restart la Home Assistant?
      description: Confirmă dacă ai încercat un restart complet înainte de a raporta.
      options:
        - "Selectează o opțiune…"
        - "Nu, nu am încercat restart."
        - "Da, am dat restart și problema persistă."
    validations:
      required: true

  - type: dropdown
    id: reinstalare
    attributes:
      label: Ați încercat să ștergeți și readăugați integrarea?
      description: Uneori o reinstalare curată rezolvă probleme de configurare.
      options:
        - "Selectează o opțiune…"
        - "Nu, nu am încercat."
        - "Da, am șters și readăugat integrarea, problema persistă."
    validations:
      required: true
